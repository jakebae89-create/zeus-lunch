<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>상식 퀴즈 - RETRO QUIZ</title>
<meta name="theme-color" content="#0a0a16">
<!-- 제우스의 점심 안에 오버레이(iframe)로 임베드됨 — PWA/서비스워커는 부모 앱이 담당 -->
<style>
  :root{
    --bg:#0a0a16; --panel:#10101f;
    --green:#39ff14; --cyan:#00f0ff; --magenta:#ff2e88;
    --yellow:#ffe600; --red:#ff3b3b; --dim:#5a5a7a;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(ellipse at 50% 0%, #14142b 0%, var(--bg) 70%);
    color:#fff; font-family:'Courier New', monospace;
    min-height:100%; display:flex; align-items:center; justify-content:center;
    padding:16px; overflow-x:hidden;
    -webkit-font-smoothing:none;
  }
  /* ── CRT 스캔라인/비네팅 오버레이 ── */
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:9999;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
    mix-blend-mode:multiply;
  }

  .cab{
    width:100%; max-width:560px; background:var(--panel);
    border:4px solid var(--cyan);
    box-shadow:0 0 0 4px #06060f, 0 0 24px rgba(0,240,255,.5), inset 0 0 30px rgba(0,240,255,.08);
    border-radius:10px; padding:22px 20px 26px;
    position:relative;
  }

  .blink{ animation:blink 1s steps(2,start) infinite; }
  @keyframes blink{ to{ visibility:hidden; } }
  .glow-c{ color:var(--cyan); text-shadow:0 0 6px var(--cyan); }
  .glow-g{ color:var(--green); text-shadow:0 0 6px var(--green); }
  .glow-m{ color:var(--magenta); text-shadow:0 0 6px var(--magenta); }
  .glow-y{ color:var(--yellow); text-shadow:0 0 6px var(--yellow); }

  /* ── 상단 HUD ── */
  .hud{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    font-size:13px; letter-spacing:1px; margin-bottom:14px; border-bottom:2px dashed #2a2a44; padding-bottom:10px; min-height:24px; }
  .hud > :first-child{ justify-self:start; text-align:left; }
  .hud > :nth-child(2){ justify-self:center; }
  .hud > :last-child{ justify-self:end; text-align:right; }
  .hud .lives{ font-size:18px; letter-spacing:3px; line-height:1; }
  .hud b{ font-weight:bold; }

  /* ── 타이틀 화면 ── */
  #title{ text-align:center; padding:24px 6px 8px; }
  #title h1{
    font-size:clamp(28px,9vw,46px); line-height:1.1; letter-spacing:2px;
    color:var(--yellow); text-shadow:3px 3px 0 var(--magenta), 6px 6px 0 rgba(255,46,136,.35);
    margin-bottom:6px; transform:skewX(-4deg);
  }
  #title .sub{ color:var(--cyan); font-size:14px; letter-spacing:4px; margin-bottom:26px; }
  #title .rules{ color:var(--dim); font-size:12px; line-height:1.9; margin:18px auto 24px; max-width:360px; }
  #title .rules span{ color:var(--green); }
  .hi{ color:var(--magenta); font-size:13px; letter-spacing:2px; margin-bottom:18px; }

  /* ── 분야 / 난이도 선택 ── */
  .selopt{ margin:0 auto 14px; max-width:380px; }
  .selopt .label{ color:var(--cyan); font-size:11px; letter-spacing:3px; margin-bottom:7px; text-shadow:0 0 5px var(--cyan); }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .chip{
    font-family:inherit; cursor:pointer; font-size:12px; letter-spacing:1px; font-weight:bold;
    background:#0c0c1c; color:var(--dim); border:2px solid #33335a; border-radius:5px;
    padding:7px 11px; transition:border-color .1s, color .1s, background .1s, transform .05s;
  }
  .chip:hover{ border-color:var(--cyan); color:#cfe; }
  .chip:active{ transform:translateY(1px); }
  .chip.on{ border-color:var(--green); color:var(--green); background:rgba(57,255,20,.14); text-shadow:0 0 5px var(--green); }

  /* ── 공통 버튼 ── */
  .btn{
    font-family:inherit; font-weight:bold; cursor:pointer;
    background:transparent; color:var(--green); border:3px solid var(--green);
    padding:12px 22px; font-size:16px; letter-spacing:2px; border-radius:6px;
    text-shadow:0 0 6px var(--green); box-shadow:0 0 12px rgba(57,255,20,.35);
    transition:transform .05s, background .1s;
  }
  .btn:hover{ background:rgba(57,255,20,.12); }
  .btn:active{ transform:translateY(2px); }

  /* 게임 중 그만두기 버튼 (작고 차분하게) */
  .exit-btn{
    color:var(--dim); border-color:#33335a; text-shadow:none; box-shadow:none;
    font-size:12px; letter-spacing:2px; padding:8px 16px;
  }
  .exit-btn:hover{ background:rgba(255,59,59,.10); border-color:var(--red); color:var(--red); }

  /* ── 게임 화면 ── */
  #game{ display:none; }
  .qbox{
    background:#06060f; border:3px solid var(--magenta); border-radius:8px;
    padding:18px 16px; min-height:96px; display:flex; align-items:center; justify-content:center;
    text-align:center; font-size:clamp(15px,4.4vw,20px); line-height:1.55; font-weight:bold;
    box-shadow:inset 0 0 16px rgba(255,46,136,.2); margin-bottom:16px;
  }
  .qnum{ color:var(--magenta); font-size:12px; letter-spacing:2px; margin-bottom:8px; text-align:center; }
  .qbox .qno{ color:var(--magenta); margin-right:6px; text-shadow:0 0 5px var(--magenta); }
  .midhud{ display:inline-flex; align-items:center; gap:10px; }
  .lvlbl{ font-size:12px; letter-spacing:1px; }
  .choices{ display:grid; gap:10px; }
  .choice{
    font-family:inherit; cursor:pointer; text-align:left;
    background:#0c0c1c; color:#dfe; border:2px solid #33335a; border-radius:6px;
    padding:13px 14px; font-size:15px; letter-spacing:.5px; display:flex; gap:12px; align-items:center;
    transition:border-color .1s, background .1s, transform .05s;
  }
  .choice .key{ color:var(--cyan); font-weight:bold; min-width:22px; text-shadow:0 0 5px var(--cyan); }
  .choice:hover:not(:disabled){ border-color:var(--cyan); background:#12122a; }
  .choice:active:not(:disabled){ transform:translateY(1px); }
  .choice:disabled{ cursor:default; }
  .choice.correct{ border-color:var(--green); background:rgba(57,255,20,.18); color:#fff; box-shadow:0 0 12px rgba(57,255,20,.5); }
  .choice.wrong{ border-color:var(--red); background:rgba(255,59,59,.18); color:#fff; }

  .feedback{ text-align:center; height:22px; margin-top:14px; font-size:15px; letter-spacing:2px; font-weight:bold; }

  /* ── 게임오버 / 클리어 ── */
  #over{ display:none; text-align:center; padding:20px 6px; }
  #over h2{ font-size:clamp(30px,10vw,52px); letter-spacing:3px; margin-bottom:8px; }
  #over .res{ font-size:15px; line-height:2; margin:14px 0 6px; }
  #over .res .v{ font-size:22px; }
  #over .newhi{ color:var(--yellow); font-size:14px; letter-spacing:2px; margin:10px 0; }

  /* ── 레벨 클리어 축하(폭죽) ── */
  #celebrate{ display:none; position:relative; text-align:center; padding:48px 6px; min-height:320px; overflow:hidden; }
  #fwCanvas{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
  #celebrate .cel-inner{ position:relative; z-index:2; }
  #celebrate .cel-badge{ color:var(--magenta); font-size:14px; letter-spacing:4px; text-shadow:0 0 6px var(--magenta); margin-bottom:14px; }
  #celebrate h2{ font-size:clamp(28px,9vw,46px); letter-spacing:3px; color:var(--yellow);
    text-shadow:3px 3px 0 var(--magenta), 6px 6px 0 rgba(255,46,136,.35); transform:skewX(-4deg); margin-bottom:18px; }
  #celebrate #celNext{ font-size:17px; letter-spacing:2px; }

  .footer{ text-align:center; color:#33334d; font-size:10px; letter-spacing:1px; margin-top:18px; }

  /* 흔들림 효과(오답) */
  @keyframes shake{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .shake{ animation:shake .35s; }

  .mute{ position:absolute; top:10px; right:12px; background:none; border:none; color:var(--dim);
    font-family:inherit; font-size:11px; cursor:pointer; letter-spacing:1px; }
  .mute:hover{ color:var(--cyan); }

  /* ── 스코어보드 (명예의 전당) ── */
  .board-wrap{ margin:6px auto 4px; max-width:340px; }
  .board-title{ color:var(--yellow); font-size:13px; letter-spacing:3px; text-shadow:0 0 6px var(--yellow); margin-bottom:8px; }
  table.board{ width:100%; border-collapse:collapse; font-size:13px; letter-spacing:1px; }
  table.board th{ color:var(--cyan); font-size:11px; letter-spacing:2px; padding:4px 6px; border-bottom:2px solid #2a2a44; }
  /* 헤더를 각 열 데이터 정렬에 맞춤 (RANK 가운데 · NAME 왼쪽 · SCORE 오른쪽) */
  table.board th:first-child{ text-align:center; width:48px; }
  table.board th:nth-child(2){ text-align:left; }
  table.board th:last-child{ text-align:right; }
  table.board td{ padding:5px 6px; color:#cfe; }
  table.board td:first-child{ color:var(--magenta); width:48px; text-align:center; font-weight:bold; }
  table.board td:nth-child(2){ text-align:left; }
  table.board td:last-child{ color:var(--green); text-align:right; font-weight:bold; text-shadow:0 0 5px var(--green); }
  table.board tr.hl td{ background:rgba(255,230,0,.14); color:#fff; }
  table.board tr.hl td:last-child{ color:var(--yellow); text-shadow:0 0 6px var(--yellow); }

  /* ── 이름 입력 ── */
  #nameEntry{ margin:8px auto 4px; }
  #nameEntry .label{ color:var(--yellow); font-size:13px; letter-spacing:2px; margin-bottom:8px; text-shadow:0 0 6px var(--yellow); }
  #nameInput{
    font-family:inherit; font-weight:bold; text-align:center; text-transform:uppercase;
    background:#06060f; color:var(--green); border:3px solid var(--green); border-radius:6px;
    font-size:26px; letter-spacing:10px; width:150px; padding:8px 4px 8px 14px; text-shadow:0 0 6px var(--green);
    box-shadow:0 0 12px rgba(57,255,20,.35); outline:none; caret-color:var(--green);
  }
</style>
</head>
<body>
<div class="cab" id="cab">
  <button class="mute" id="muteBtn" onclick="toggleMute()">♪ SOUND: ON</button>

  <!-- ══ 타이틀 ══ -->
  <section id="title">
    <h1>상식 퀴즈</h1>
    <div class="hi" id="hiTitle">HI-SCORE&nbsp; 0</div>

    <div class="selopt">
      <div class="label">▣ 분야 SELECT</div>
      <div class="chips" id="catChips"></div>
    </div>
    <div class="selopt">
      <div class="label">▣ 난이도 LEVEL</div>
      <div class="chips" id="lvChips"></div>
    </div>

    <button class="btn" onclick="startGame()">▶ PRESS START</button>
    <div class="rules">
      <span>3번 틀리면 GAME OVER</span>
    </div>
    <div class="board-wrap">
      <div class="board-title">★ HALL OF FAME ★</div>
      <div id="boardTitle"></div>
    </div>
  </section>

  <!-- ══ 게임 ══ -->
  <section id="game">
    <div class="hud">
      <span class="glow-c">SCORE <b id="score">0</b></span>
      <span class="midhud">
        <span class="lives glow-m" id="lives">♥♥♥</span>
        <span class="lvlbl glow-g" id="level">레벨 1</span>
      </span>
      <span class="glow-y" id="combo"></span>
    </div>
    <div class="qbox" id="qbox">문제</div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div style="text-align:center; margin-top:14px;">
      <button class="btn exit-btn" onclick="quitGame()">■ 그만두기 (ESC)</button>
    </div>
  </section>

  <!-- ══ 게임오버 / 클리어 ══ -->
  <section id="over">
    <h2 id="overTitle" class="glow-m">GAME OVER</h2>
    <div class="res">
      <div>SCORE</div>
      <div class="v glow-g" id="finalScore">0</div>
      <div class="glow-c" id="finalStat" style="font-size:13px;"></div>
    </div>
    <div class="newhi blink" id="newHi" style="display:none;">★ NEW HI-SCORE! ★</div>

    <div id="nameEntry" style="display:none;">
      <div class="label blink">★ 랭킹 진입! 이름 3글자 입력 ★</div>
      <input id="nameInput" maxlength="3" autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter'){submitName();event.preventDefault();}">
      <div><button class="btn" style="margin-top:12px;font-size:13px;padding:9px 18px;" onclick="submitName()">▶ 등록</button></div>
    </div>

    <div class="board-wrap" style="margin-top:14px;">
      <div class="board-title">★ HALL OF FAME ★</div>
      <div id="boardOver"></div>
    </div>

    <button class="btn" onclick="startGame()" style="margin-top:16px;">↻ RETRY</button>
    <div style="margin-top:14px;">
      <button class="btn" style="border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,.35);text-shadow:0 0 6px var(--cyan);font-size:13px;padding:9px 16px;" onclick="toTitle()">TITLE</button>
    </div>
  </section>

  <!-- ══ 레벨 클리어 축하(폭죽) ══ -->
  <section id="celebrate">
    <canvas id="fwCanvas"></canvas>
    <div class="cel-inner">
      <div class="cel-badge blink">★ STAGE CLEAR ★</div>
      <h2 id="celTitle" class="glow-y">LEVEL 1 CLEAR!</h2>
      <div id="celNext" class="glow-c">다음 ▶ 레벨 2</div>
    </div>
  </section>

  <div class="footer">© 2026 Jakebae &nbsp;·&nbsp; RETRO QUIZ v1.1</div>
</div>

<!-- 자동 생성된 대용량 문제 은행 (3000+). 없으면 아래 내장 문제로 대체 -->
<script src="questions.js?v=7"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 문제 은행 (상식)  answer = 정답 인덱스
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// cat: 분야(SCI 과학 / HIS 역사 / GEO 지리 / GEN 상식 / LANG 어휘)
// lv : 난이도(1 쉬움 / 2 보통 / 3 어려움)
// questions.js 가 로드되면 window.QUESTION_BANK 사용, 아니면 아래 내장 문제 사용
const FALLBACK_QUESTIONS = [
  // ── 과학 (SCI) ──
  { q:"물의 화학 기호는?", c:["O2","H2O","CO2","NaCl"], a:1, cat:"SCI", lv:1 },
  { q:"태양계에서 가장 큰 행성은?", c:["지구","토성","목성","화성"], a:2, cat:"SCI", lv:1 },
  { q:"물이 끓는 온도는? (섭씨, 1기압)", c:["50도","90도","100도","120도"], a:2, cat:"SCI", lv:1 },
  { q:"지구에서 가장 가까운 항성은?", c:["북극성","시리우스","태양","프록시마"], a:2, cat:"SCI", lv:1 },
  { q:"사람의 몸에서 가장 큰 장기는?", c:["심장","간","피부","폐"], a:2, cat:"SCI", lv:2 },
  { q:"빛의 삼원색이 아닌 것은?", c:["빨강","초록","파랑","노랑"], a:3, cat:"SCI", lv:2 },
  { q:"DNA의 한국어 명칭은?", c:["단백질","유전자","효소","호르몬"], a:1, cat:"SCI", lv:2 },
  { q:"소금의 화학명은?", c:["염화나트륨","탄산칼슘","황산","산화철"], a:0, cat:"SCI", lv:2 },
  { q:"식물이 광합성에 사용하는 기체는?", c:["산소","질소","이산화탄소","수소"], a:2, cat:"SCI", lv:2 },
  { q:"소리의 속도는 약? (공기 중)", c:["340 m/s","3,000 m/s","30 m/s","3만 m/s"], a:0, cat:"SCI", lv:3 },
  { q:"인체에서 적혈구를 만드는 곳은?", c:["간","골수","심장","신장"], a:1, cat:"SCI", lv:3 },
  { q:"원자번호 1번 원소는?", c:["헬륨","수소","산소","탄소"], a:1, cat:"SCI", lv:3 },

  // ── 역사 (HIS) ──
  { q:"훈민정음을 창제한 왕은?", c:["세종대왕","태조","정조","광개토대왕"], a:0, cat:"HIS", lv:1 },
  { q:"임진왜란 때 거북선을 이끈 장군은?", c:["권율","이순신","강감찬","을지문덕"], a:1, cat:"HIS", lv:1 },
  { q:"한글날은 몇 월인가?", c:["3월","5월","9월","10월"], a:3, cat:"HIS", lv:1 },
  { q:"조선을 건국한 인물은?", c:["이성계","왕건","이방원","정몽주"], a:0, cat:"HIS", lv:2 },
  { q:"삼국시대 국가가 아닌 것은?", c:["고구려","백제","신라","발해"], a:3, cat:"HIS", lv:2 },
  { q:"고려를 건국한 인물은?", c:["궁예","견훤","왕건","이성계"], a:2, cat:"HIS", lv:2 },
  { q:"우리나라가 광복(해방)된 해는?", c:["1919년","1945년","1950년","1948년"], a:1, cat:"HIS", lv:2 },
  { q:"3·1 운동이 일어난 해는?", c:["1910년","1919년","1929년","1945년"], a:1, cat:"HIS", lv:3 },
  { q:"신라의 삼국통일을 완성한 왕은?", c:["진흥왕","무열왕","문무왕","법흥왕"], a:2, cat:"HIS", lv:3 },
  { q:"조선의 마지막 왕(황제)은?", c:["고종","순종","철종","영조"], a:1, cat:"HIS", lv:3 },

  // ── 지리 (GEO) ──
  { q:"대한민국의 수도는?", c:["부산","서울","인천","대전"], a:1, cat:"GEO", lv:1 },
  { q:"에펠탑이 있는 도시는?", c:["런던","로마","파리","베를린"], a:2, cat:"GEO", lv:1 },
  { q:"빅벤이 있는 나라는?", c:["프랑스","영국","독일","미국"], a:1, cat:"GEO", lv:1 },
  { q:"세계에서 가장 높은 산은?", c:["백두산","에베레스트","후지산","킬리만자로"], a:1, cat:"GEO", lv:1 },
  { q:"일본의 수도는?", c:["오사카","교토","도쿄","나고야"], a:2, cat:"GEO", lv:1 },
  { q:"피라미드로 유명한 나라는?", c:["그리스","이집트","멕시코","인도"], a:1, cat:"GEO", lv:1 },
  { q:"세계에서 가장 긴 강은?", c:["나일강","아마존강","양쯔강","미시시피강"], a:0, cat:"GEO", lv:2 },

  { q:"세계에서 면적이 가장 넓은 나라는?", c:["캐나다","중국","미국","러시아"], a:3, cat:"GEO", lv:2 },
  { q:"자유의 여신상이 있는 도시는?", c:["워싱턴","뉴욕","보스턴","시카고"], a:1, cat:"GEO", lv:2 },
  { q:"사하라 사막이 있는 대륙은?", c:["아시아","아프리카","남미","호주"], a:1, cat:"GEO", lv:2 },
  { q:"세계에서 가장 깊은 바다(해구)는?", c:["마리아나 해구","일본 해구","페루 해구","자바 해구"], a:0, cat:"GEO", lv:3 },
  { q:"오스트레일리아의 수도는?", c:["시드니","멜버른","캔버라","브리즈번"], a:2, cat:"GEO", lv:3 },

  // ── 상식 (GEN) ──
  { q:"1년은 며칠인가? (평년)", c:["360일","364일","365일","366일"], a:2, cat:"GEN", lv:1 },
  { q:"무지개의 색은 모두 몇 가지?", c:["5가지","6가지","7가지","8가지"], a:2, cat:"GEN", lv:1 },
  { q:"올림픽은 몇 년마다 열리나? (하계)", c:["2년","3년","4년","5년"], a:2, cat:"GEN", lv:1 },
  { q:"한국의 국화(나라꽃)는?", c:["진달래","장미","무궁화","벚꽃"], a:2, cat:"GEN", lv:1 },
  { q:"컴퓨터의 두뇌라 불리는 부품은?", c:["RAM","CPU","HDD","GPU"], a:1, cat:"GEN", lv:1 },
  { q:"축구 한 팀의 경기 선수는 몇 명?", c:["9명","10명","11명","12명"], a:2, cat:"GEN", lv:1 },
  { q:"1시간은 몇 분인가?", c:["50분","60분","90분","100분"], a:1, cat:"GEN", lv:1 },
  { q:"피아노 건반은 모두 몇 개?", c:["76개","88개","92개","100개"], a:1, cat:"GEN", lv:2 },
  { q:"피보나치 수열에서 8 다음 수는?", c:["11","12","13","15"], a:2, cat:"GEN", lv:2 },
  { q:"태극기 가운데에 있는 무늬의 이름은?", c:["태극","건곤","음양","사괘"], a:0, cat:"GEN", lv:2 },
  { q:"무지개가 생기는 주된 원리는?", c:["빛의 반사","빛의 굴절","빛의 흡수","빛의 소멸"], a:1, cat:"GEN", lv:3 },
];

// 대용량 문제 은행이 있으면 그것을, 없으면 내장 문제를 사용
const QUESTIONS = (window.QUESTION_BANK && window.QUESTION_BANK.length) ? window.QUESTION_BANK : FALLBACK_QUESTIONS;

const LIVES_MAX = 3;
let pool = [], idx = 0, score = 0, lives = LIVES_MAX, combo = 0, locked = false;
let solved = 0;               // 끝없이 풀기 — 지금까지 푼(시도한) 문제 수
let cur = null;               // 현재 문제(보기 셔플 적용본)
let best = 0;                 // 이번 판 최고 콤보
let timer = null;             // 다음 문제/게임오버 예약 타이머
let muted = false;

// ── 레벨 진행(스테이지) ──
const STAGE_GOAL = 20;        // 한 레벨에서 정답 N개를 맞히면 클리어
let progression = false;      // 난이도 '전체' 선택 시 레벨 1→2→3 진행 모드
let stageLevel = 1;           // 현재 진행 중인 레벨
let stageCorrect = 0;         // 현재 레벨에서 맞힌 정답 수
let stageMaxed = false;       // 레벨 3까지 모두 클리어함

// ── 분야 / 난이도 선택 ──
const CATS = [
  { key:'ALL', label:'전체' }, { key:'SCI', label:'과학' },
  { key:'HIS', label:'역사' }, { key:'GEO', label:'지리' },
  { key:'GEN', label:'상식' }, { key:'LANG', label:'우리말' },
  { key:'KBO', label:'야구' },
];
const LVLS = [
  { key:0, label:'전체' }, { key:1, label:'1' }, { key:2, label:'2' }, { key:3, label:'3' },
];
let selCat = 'ALL', selLv = 0;

function renderChips(){
  $('catChips').innerHTML = CATS.map(o=>
    `<button class="chip${o.key===selCat?' on':''}" onclick="setCat('${o.key}')">${o.label}</button>`).join('');
  $('lvChips').innerHTML = LVLS.map(o=>
    `<button class="chip${o.key===selLv?' on':''}" onclick="setLv(${o.key})">${o.label}</button>`).join('');
}
function setCat(k){ selCat = k; beep(660,0.04); renderChips(); }
function setLv(k){ selLv = k; beep(660,0.04); renderChips(); }
function filteredQuestions(){
  return QUESTIONS.filter(q =>
    (selCat==='ALL' || q.cat===selCat) && (selLv===0 || q.lv===selLv));
}

const $ = id => document.getElementById(id);
function show(view){ ['title','game','over','celebrate'].forEach(v => $(v).style.display = (v===view ? 'block' : 'none')); }

// ── 사운드 (WebAudio, 레트로 비프) ──
let actx = null;
function beep(freq, dur=0.08, type='square', vol=0.15){
  if (muted) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
    o.start(); o.stop(actx.currentTime + dur);
  }catch(e){}
}
function sndCorrect(){ beep(660,0.07); setTimeout(()=>beep(990,0.1),70); }
function sndWrong(){ beep(180,0.18,'sawtooth',0.18); }
function sndOver(){ [440,330,220,160].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.16),i*150)); }
function sndStart(){ beep(523,0.06); setTimeout(()=>beep(784,0.08),70); }
function sndClear(){ [523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.14,'square',0.14),i*130)); }
function toggleMute(){ muted=!muted; $('muteBtn').textContent = '♪ SOUND: ' + (muted?'OFF':'ON'); if(!muted) beep(700,0.05); }

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ── 명예의 전당 (TOP 5) ──
const DEFAULT_SCORES = [
  {name:'JAK', score:800}, {name:'BAE', score:600},
  {name:'CPU', score:400}, {name:'ABC', score:200}, {name:'YOU', score:100}
];
let pendingScore = 0;

function getScores(){
  try{ const s = JSON.parse(localStorage.getItem('quiz_scores')); if (Array.isArray(s) && s.length) return s; }catch(e){}
  return DEFAULT_SCORES.slice();
}
function saveScores(arr){ localStorage.setItem('quiz_scores', JSON.stringify(arr.slice(0,5))); }
function hiScore(){ return getScores()[0] ? getScores()[0].score : 0; }
function qualifies(sc){ const s = getScores(); return sc > 0 && (s.length < 5 || sc > s[s.length-1].score); }

function renderBoard(elId, hlIndex){
  const s = getScores();
  let html = '<table class="board"><tr><th>RANK</th><th>NAME</th><th>SCORE</th></tr>';
  for (let i=0;i<5;i++){
    const e = s[i] || {name:'---', score:0};
    html += `<tr${i===hlIndex?' class="hl"':''}><td>${i+1}</td><td>${e.name}</td><td>${String(e.score).padStart(5,'0')}</td></tr>`;
  }
  html += '</table>';
  const el = $(elId); if (el) el.innerHTML = html;
}

function submitName(){
  let nm = ($('nameInput').value || '').trim().toUpperCase().slice(0,3);
  if (!nm) nm = 'AAA';
  const s = getScores();
  const entry = {name:nm, score:pendingScore};
  s.push(entry); s.sort((a,b)=>b.score-a.score);
  const top = s.slice(0,5);
  saveScores(top);
  const hl = top.indexOf(entry);
  $('nameEntry').style.display = 'none';
  renderBoard('boardOver', hl);
  beep(880,0.07); setTimeout(()=>beep(1175,0.12),80);
}

// ── 게임 시작 (끝없이 풀기) ──
// 선택 분야 안에서 특정 레벨의 문제만
function poolFor(level){
  return QUESTIONS.filter(q => (selCat==='ALL' || q.cat===selCat) && q.lv===level);
}
function buildStagePool(){
  if (progression){
    pool = shuffle(poolFor(stageLevel));
    while (pool.length === 0 && stageLevel < 3){ stageLevel++; pool = shuffle(poolFor(stageLevel)); }
  } else {
    pool = shuffle(filteredQuestions());
  }
  idx = 0;
}

function startGame(){
  const bank = filteredQuestions();
  if (bank.length === 0){ sndWrong(); return; }   // 해당 조합 문제 없음
  sndStart();
  score = 0; lives = LIVES_MAX; combo = 0; idx = 0; solved = 0; best = 0; locked = false;
  // 난이도 '전체'면 레벨 1→2→3 진행 모드, 특정 레벨이면 그 레벨만
  progression = (selLv === 0);
  stageLevel = progression ? 1 : selLv;
  stageCorrect = 0; stageMaxed = false;
  buildStagePool();
  show('game');
  renderHud();
  renderQuestion();
}

function renderHud(){
  $('score').textContent = score;
  $('lives').textContent = '♥'.repeat(lives) + '♡'.repeat(LIVES_MAX - lives);
  $('combo').textContent = combo >= 2 ? ('x'+combo+' COMBO') : '';
}

function renderQuestion(){
  locked = false;
  // 매 문항 보기를 셔플 (원본은 보존)
  const src = pool[idx];
  const order = shuffle([0,1,2,3]);
  cur = { q:src.q, c:order.map(i=>src.c[i]), a:order.indexOf(src.a) };
  // 현재 문제의 난이도 레벨을 HUD(하트 옆)에 표시
  $('level').textContent = '레벨 ' + src.lv;
  // 문제 앞에 Q번호 표시
  const qbox = $('qbox');
  qbox.innerHTML = '';
  const qno = document.createElement('span');
  qno.className = 'qno';
  qno.textContent = `Q${solved+1}`;
  qbox.appendChild(qno);
  qbox.appendChild(document.createTextNode(' ' + cur.q));
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  const keys = ['1','2','3','4'];
  $('choices').innerHTML = '';
  cur.c.forEach((txt,i)=>{
    const b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = `<span class="key">${keys[i]}</span><span>${txt}</span>`;
    b.onclick = ()=>answer(i);
    $('choices').appendChild(b);
  });
}

function answer(i){
  if (locked) return;
  locked = true;
  solved++;                                  // 이 문항을 시도함
  const btns = $('choices').querySelectorAll('.choice');
  btns.forEach(b=>b.disabled = true);

  if (i === cur.a){
    combo++;
    if (combo > best) best = combo;
    const gain = 100 + (combo>=2 ? (combo-1)*20 : 0);   // 연속정답 보너스
    score += gain;
    btns[i].classList.add('correct');
    $('feedback').textContent = '◎ 정답! +' + gain;
    $('feedback').classList.add('glow-g');
    sndCorrect();
    stageCorrect++;
    renderHud();
    // 레벨 진행 모드: 정답 STAGE_GOAL개 달성 시 레벨 클리어
    if (progression && !stageMaxed && stageCorrect >= STAGE_GOAL){
      timer = setTimeout(levelClear, 850);
    } else {
      timer = setTimeout(next, 850);
    }
  } else {
    combo = 0;
    lives--;
    btns[i].classList.add('wrong');
    btns[cur.a].classList.add('correct');   // 정답 표시
    $('feedback').textContent = '✕ 오답! LIFE -1';
    $('feedback').classList.add('glow-m');
    $('cab').classList.add('shake');
    setTimeout(()=>$('cab').classList.remove('shake'),350);
    sndWrong();
    renderHud();
    if (lives <= 0){ timer = setTimeout(endGame, 950); }
    else timer = setTimeout(next, 1100);
  }
}

function next(){
  idx++;
  if (idx >= pool.length){ idx = 0; pool = shuffle(pool); }   // 다 풀면 다시 섞어 계속
  renderQuestion();
}

// ── 레벨 클리어 → 폭죽 축하(3초) → 다음 레벨 ──
function levelClear(){
  const cleared = stageLevel;
  const allClear = (cleared >= 3);
  locked = true;
  show('celebrate');
  $('celTitle').textContent = allClear ? 'ALL CLEAR!' : `LEVEL ${cleared} CLEAR!`;
  $('celNext').textContent  = allClear ? '★ 최고 난이도 계속 도전! ★' : `다음 ▶ 레벨 ${cleared+1}`;
  startFireworks();
  sndClear();
  timer = setTimeout(()=>{
    stopFireworks();
    stageCorrect = 0;
    if (allClear){
      stageMaxed = true;                 // 더는 클리어 연출 없이 레벨3 계속
      idx++; if (idx >= pool.length){ idx = 0; pool = shuffle(pool); }
    } else {
      stageLevel = cleared + 1;
      buildStagePool();                  // 다음 레벨 문제로 교체(idx=0)
    }
    show('game');
    locked = false;
    renderHud();
    renderQuestion();
  }, 3000);
}

// ── 레트로 픽셀 폭죽 (canvas) ──
let fwRAF = null, fwCtx = null, fwParticles = [], fwLaunchCd = 0;
function startFireworks(){
  const cv = $('fwCanvas');
  const rect = cv.getBoundingClientRect();
  cv.width = Math.max(320, rect.width|0);
  cv.height = Math.max(260, rect.height|0);
  fwCtx = cv.getContext('2d');
  fwParticles = []; fwLaunchCd = 0;
  fwBurst(cv.width*0.5, cv.height*0.42);
  function frame(){
    fwCtx.clearRect(0,0,cv.width,cv.height);
    if (--fwLaunchCd <= 0){
      fwLaunchCd = 16;
      fwBurst(40 + Math.random()*(cv.width-80), 30 + Math.random()*(cv.height*0.55));
    }
    for (let i=fwParticles.length-1;i>=0;i--){
      const p = fwParticles[i];
      p.vy += 0.12; p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0){ fwParticles.splice(i,1); continue; }
      fwCtx.globalAlpha = Math.max(0, Math.min(1, p.life/22));
      fwCtx.fillStyle = p.color;
      fwCtx.fillRect(p.x|0, p.y|0, 3, 3);   // 픽셀 사각형
    }
    fwCtx.globalAlpha = 1;
    fwRAF = requestAnimationFrame(frame);
  }
  fwRAF = requestAnimationFrame(frame);
}
function fwBurst(x, y){
  const colors = ['#39ff14','#00f0ff','#ff2e88','#ffe600','#ffffff'];
  const col = colors[(Math.random()*colors.length)|0];
  const n = 24;
  for (let i=0;i<n;i++){
    const a = (Math.PI*2*i)/n;
    const sp = 1.6 + Math.random()*2.2;
    fwParticles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:34+Math.random()*20, color:col });
  }
  beep(600 + Math.random()*500, 0.05, 'square', 0.09);
}
function stopFireworks(){
  if (fwRAF) cancelAnimationFrame(fwRAF);
  fwRAF = null; fwParticles = [];
  if (fwCtx){ const cv=$('fwCanvas'); fwCtx.clearRect(0,0,cv.width,cv.height); }
}

function endGame(){
  show('over');
  pendingScore = score;
  const isTop1 = score > 0 && score > hiScore();   // 1위 갱신 여부(이름 등록 전 기준)
  $('overTitle').textContent = 'GAME OVER';
  $('overTitle').className = 'glow-m';
  $('finalScore').textContent = score;
  $('finalStat').textContent = `${solved}문제 도전 · 최고 ${best} 콤보`;
  $('newHi').style.display = isTop1 ? 'block' : 'none';

  if (qualifies(score)){
    $('nameEntry').style.display = 'block';
    $('nameInput').value = '';
    renderBoard('boardOver', -1);          // 등록 전 현재 보드
    setTimeout(()=>$('nameInput').focus(), 100);
  } else {
    $('nameEntry').style.display = 'none';
    renderBoard('boardOver', -1);
  }

  sndOver();
}

// 게임 도중 그만두고 메인으로 (점수 저장 없음)
function quitGame(){
  clearTimeout(timer);   // 예약된 다음 문제/게임오버 취소
  stopFireworks();       // 축하 연출 중이면 정리
  locked = true;
  beep(330,0.06); setTimeout(()=>beep(220,0.1),60);
  toTitle();
}

function toTitle(){ $('hiTitle').textContent = 'HI-SCORE  ' + hiScore(); renderBoard('boardTitle', -1); show('title'); }

// 키보드 입력
document.addEventListener('keydown', e=>{
  if ($('game').style.display !== 'none'){
    if (e.key === 'Escape'){ quitGame(); }
    else if (['1','2','3','4'].includes(e.key)) answer(parseInt(e.key)-1);
  } else if (e.key === 'Enter' || e.key === ' '){
    if ($('title').style.display !== 'none' || $('over').style.display !== 'none') startGame();
  }
});

// 초기
$('hiTitle').textContent = 'HI-SCORE  ' + hiScore();
if ($('bankCount')) $('bankCount').textContent = QUESTIONS.length.toLocaleString();
renderChips();
renderBoard('boardTitle', -1);
show('title');

// 서비스워커 등록은 부모 앱(제우스의 점심)이 담당하므로 임베드 화면에선 생략
